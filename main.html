<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תמ"ל 3007 — אינפוגרפיקה</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      direction: rtl;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    /* ===== HEADER ===== */
    #header {
      background: linear-gradient(135deg, #0f3460, #16213e);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #e94560;
      z-index: 1100;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }
    #header h1 span { color: #4a9eff; }
    #header .nav-links {
      display: flex;
      gap: 14px;
    }
    #header .nav-links a {
      color: #a0b4cc;
      text-decoration: none;
      font-size: 0.78rem;
      padding: 5px 12px;
      border: 1px solid #2a3a50;
      border-radius: 6px;
      transition: all 0.25s;
    }
    #header .nav-links a:hover {
      color: #fff;
      border-color: #4a9eff;
      background: rgba(74,158,255,0.1);
    }
    /* ===== FOOTER ===== */
    #site-footer {
      background: #0d1b2a;
      padding: 6px 24px;
      text-align: center;
      font-size: 0.68rem;
      color: #556;
      border-top: 1px solid #2a3a50;
      flex-shrink: 0;
    }

    #header .header-logos {
      height: 40px;
      border-radius: 4px;
    }

    /* ===== MAIN LAYOUT ===== */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== THEME PANEL (RIGHT) ===== */
    #theme-panel {
      width: 200px;
      min-width: 180px;
      background: #16213e;
      display: flex;
      flex-direction: column;
      z-index: 1000;
      box-shadow: -3px 0 12px rgba(0,0,0,0.4);
      overflow-y: auto;
    }

    .panel-section {
      padding: 16px 14px;
    }

    /* ===== LEGEND PANEL (SEPARATE COLUMN) ===== */
    #legend-panel {
      width: 220px;
      min-width: 180px;
      background: #0f1b30;
      display: flex;
      flex-direction: column;
      z-index: 999;
      border-right: 1px solid #2a3a50;
      transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
      overflow: hidden;
    }
    #legend-panel.collapsed {
      width: 0;
      min-width: 0;
      padding: 0;
      opacity: 0;
      border-right: none;
    }
    #legend-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 8px;
      flex-shrink: 0;
    }
    #legend-panel-header .legend-title {
      margin-bottom: 0;
    }
    #legend-toggle-close {
      background: none;
      border: 1px solid #2a3a50;
      border-radius: 6px;
      color: #7a8fa0;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 7px;
      line-height: 1;
      transition: all 0.2s;
    }
    #legend-toggle-close:hover {
      color: #e94560;
      border-color: #e94560;
    }
    /* Open button — inside theme panel */
    #legend-toggle-open {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 0;
      border: 2px dashed #2a3a50;
      border-radius: 10px;
      background: transparent;
      color: #7a8fa0;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      direction: rtl;
    }
    #legend-toggle-open:hover {
      border-color: #4a9eff;
      color: #4a9eff;
    }
    #legend-toggle-open.visible {
      display: flex;
    }
    .panel-section-title {
      font-size: 0.72rem;
      color: #7a8fa0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    /* Theme Buttons */
    .theme-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 13px 14px;
      margin-bottom: 8px;
      border: 2px solid #2a3a50;
      border-radius: 10px;
      background: #0d1b2a;
      color: #a0b4cc;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: right;
      direction: rtl;
      font-family: inherit;
    }
    .theme-btn:hover {
      border-color: #4a9eff;
      background: #162850;
      color: #e0e0e0;
    }
    .theme-btn.active {
      border-color: #4a9eff;
      background: linear-gradient(135deg, #0f3460, #1a3a6a);
      color: #fff;
      box-shadow: 0 0 14px rgba(74, 158, 255, 0.25);
    }
    .theme-btn .icon {
      font-size: 1.25rem;
      min-width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .theme-btn .label { flex: 1; }

    /* Separator */
    .panel-divider {
      height: 1px;
      background: #2a3a50;
      margin: 4px 14px 8px;
    }

    /* ===== LEGEND ===== */
    #legend-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 14px 14px;
    }
    #legend-container::-webkit-scrollbar { width: 5px; }
    #legend-container::-webkit-scrollbar-thumb { background: #2a3a50; border-radius: 3px; }

    .legend-title {
      font-size: 0.75rem;
      color: #7a8fa0;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Default legend items */
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 0.76rem;
      color: #c0d0e0;
      direction: rtl;
    }
    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .legend-count {
      color: #7a8fa0;
      font-size: 0.7rem;
      margin-right: auto;
    }

    /* Height gradient legend */
    .gradient-bar {
      width: 22px;
      height: 180px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .gradient-legend {
      display: flex;
      gap: 10px;
      direction: ltr;
    }
    .gradient-ticks {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #a0b4cc;
    }
    .gradient-ticks span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .gradient-ticks span::before {
      content: '—';
      color: #4a5a6a;
      font-size: 0.6rem;
    }

    /* Filter legend (public spaces / buildings) */
    .filter-legend-card {
      background: #0d1b2a;
      border-radius: 10px;
      padding: 14px;
      border: 1px solid #2a3a50;
    }
    .filter-legend-stat {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .filter-legend-label {
      font-size: 0.78rem;
      color: #a0b4cc;
      margin-bottom: 10px;
    }
    .filter-legend-detail {
      font-size: 0.74rem;
      color: #7a8fa0;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .filter-legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* Stats bar */
    .stats-bar {
      padding: 8px 14px;
      font-size: 0.68rem;
      color: #5a6a7a;
      border-top: 1px solid #2a3a50;
      text-align: center;
      flex-shrink: 0;
    }

    /* Height "no data" note */
    .legend-note {
      font-size: 0.68rem;
      color: #5a6a7a;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #1a2a3a;
    }

    /* ===== MAP ===== */
    #map {
      flex: 1;
      background: #0a0a1a;
    }

    /* ===== PARCEL LABELS ===== */
    .parcel-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #e0e0e0;
      font-size: 9px;
      font-weight: 700;
      text-shadow:
        1px 1px 0 rgba(0,0,0,0.8),
        -1px -1px 0 rgba(0,0,0,0.8),
        1px -1px 0 rgba(0,0,0,0.8),
        -1px 1px 0 rgba(0,0,0,0.8),
        0 1px 0 rgba(0,0,0,0.8),
        0 -1px 0 rgba(0,0,0,0.8);
      pointer-events: none;
      padding: 0 !important;
      white-space: nowrap;
    }

    /* ===== COMPOUND LABELS ===== */
    .compound-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      text-shadow:
        2px 2px 0 rgba(0,0,0,0.9),
        -2px -2px 0 rgba(0,0,0,0.9),
        2px -2px 0 rgba(0,0,0,0.9),
        -2px 2px 0 rgba(0,0,0,0.9),
        0 2px 0 rgba(0,0,0,0.9),
        0 -2px 0 rgba(0,0,0,0.9);
      pointer-events: none;
    }

    /* ===== LEAFLET OVERRIDES ===== */
    .leaflet-interactive {
      transition: fill-opacity 0.4s ease, fill 0.4s ease, stroke 0.3s ease, stroke-width 0.3s ease;
    }

    .leaflet-popup-content-wrapper {
      background: #16213e;
      color: #e0e0e0;
      border-radius: 10px;
      border: 1px solid #2a3a50;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: #16213e; }
    .leaflet-popup-content {
      margin: 12px 16px;
      font-family: 'Segoe UI', Arial, sans-serif;
      direction: rtl;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .leaflet-popup-close-button { color: #7a8fa0 !important; }
    .leaflet-popup-close-button:hover { color: #e94560 !important; }

    .popup-title {
      font-size: 1rem;
      font-weight: 700;
      color: #4a9eff;
      margin-bottom: 6px;
    }
    .popup-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }
    .popup-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid #1a2a3a;
    }
    .popup-row:last-child { border-bottom: none; }
    .popup-label { color: #7a8fa0; }
    .popup-value { color: #e0e0e0; font-weight: 600; }

    /* ===== LOADING OVERLAY ===== */
    #loading {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a3a50;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      #main { flex-direction: column-reverse; }
      #theme-panel {
        width: 100%;
        flex-direction: row;
        min-width: auto;
        max-height: none;
        overflow: hidden;
      }
      .panel-section {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: flex-start;
        padding: 8px;
        width: 100%;
      }
      .panel-section-title { display: none; }
      .theme-btn {
        min-width: 0;
        width: calc(20% - 5px);
        flex-direction: column;
        font-size: 0.62rem;
        padding: 6px 4px;
        text-align: center;
        margin-bottom: 0;
      }
      .theme-btn .icon { font-size: 1rem; min-width: auto; }
      #legend-panel {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading"><div class="spinner"></div></div>

  <!-- Header -->
  <header id="header">
    <img src="data/logos.JPG" alt="לוגואים" class="header-logos" />
    <h1>📊 תמ"ל <span>3007</span> — אינפוגרפיקה</h1>
    <div class="nav-links">
      <a href="instructions.html">📖 הוראות מול תשריט</a>
      <a href="landing.html">🔍 מידע תכנוני</a>
      <a href="index.html">🗺️ מפה מלאה</a>
    </div>
  </header>

  <!-- Main content -->
  <div id="main">
    <!-- Theme Panel (Right side in RTL) -->
    <aside id="theme-panel">
      <div class="panel-section">
        <div class="panel-section-title">נושאים</div>
        <button class="theme-btn active" data-theme="default" onclick="setTheme('default')">
          <span class="icon">🎨</span>
          <span class="label">ייעודי קרקע</span>
        </button>
        <button class="theme-btn" data-theme="height" onclick="setTheme('height')">
          <span class="icon">🏗️</span>
          <span class="label">גובה בינוי</span>
        </button>
        <button class="theme-btn" data-theme="publicSpaces" onclick="setTheme('publicSpaces')">
          <span class="icon">🌳</span>
          <span class="label">שטחים ציבוריים</span>
        </button>
        <button class="theme-btn" data-theme="publicBuildings" onclick="setTheme('publicBuildings')">
          <span class="icon">🏛️</span>
          <span class="label">מבני ציבור</span>
        </button>
        <button class="theme-btn" data-theme="roads" onclick="setTheme('roads')">
          <span class="icon">🛣️</span>
          <span class="label">דרכים</span>
        </button>
        <button class="theme-btn" data-theme="compounds" onclick="setTheme('compounds')">
          <span class="icon">📐</span>
          <span class="label">מתחמי תכנון</span>
        </button>
        <button class="theme-btn" data-theme="municipality" onclick="setTheme('municipality')">
          <span class="icon">🏙️</span>
          <span class="label">רשויות</span>
        </button>
        <button class="theme-btn" data-theme="ownership" onclick="setTheme('ownership')">
          <span class="icon">👤</span>
          <span class="label">הקצאות בעלות</span>
        </button>
        <button class="theme-btn" data-theme="affordable" onclick="setTheme('affordable')">
          <span class="icon">🏠</span>
          <span class="label">דיור בהישג יד</span>
        </button>
        <button class="theme-btn" data-theme="contamination" onclick="setTheme('contamination')">
          <span class="icon">☣️</span>
          <span class="label">אתרים חשודים בזיהום</span>
        </button>
        <button class="theme-btn" data-theme="publicInTradeable" onclick="setTheme('publicInTradeable')">
          <span class="icon">🏛️</span>
          <span class="label">מבני ציבור בשטחים סחירים</span>
        </button>
      </div>

      <div class="panel-divider"></div>

      <div style="padding: 0 14px 8px;">
        <button id="legend-toggle-open" onclick="toggleLegendPanel(true)">
          📋 הצג מקרא
        </button>
      </div>

      <div class="stats-bar" id="stats-bar">טוען נתונים...</div>
    </aside>

    <!-- Legend Panel (separate column) -->
    <aside id="legend-panel">
      <div id="legend-panel-header">
        <div class="legend-title">מקרא</div>
        <button id="legend-toggle-close" onclick="toggleLegendPanel(false)" title="סגור מקרא">✕</button>
      </div>
      <div id="legend-container">
        <div id="legend-content"></div>
      </div>
    </aside>

    <!-- Map -->
    <div id="map"></div>
  </div>

<script>
// ===================================================================
//  קבועים
// ===================================================================

// צבעי MAVAT — קוד ייעוד סטנדרטי
const MAVAT_CODE_COLORS = {
  100: "#FFFF00",  110: "#FFFF00",  120: "#FFFF4D",  130: "#FFE600",
  140: "#FFCC00",  150: "#FFE066",  160: "#FFD700",  170: "#FFEB3B",
  180: "#FFF176",  190: "#FFF59D",
  200: "#D4A5FF",  210: "#C68EFF",  220: "#B877FF",  230: "#DDB8FF",
  240: "#C490E0",  250: "#B07ACC",  260: "#DDB8FF",  270: "#E8CCFF",
  300: "#FF4444",  310: "#FF5555",  320: "#FF6666",  330: "#EE3333",
  340: "#FF7777",  350: "#FF5252",
  400: "#8B4513",  410: "#A0522D",  420: "#9B6A3D",  430: "#7B3F00",
  440: "#6B3410",  450: "#A67B5B",  460: "#5C3317",
  500: "#A0A0A0",  510: "#909090",  520: "#B0B0B0",  530: "#858585",
  540: "#787878",  550: "#C0C0C0",
  600: "#66CC66",  610: "#77DD77",  620: "#55BB55",  630: "#44AA44",
  640: "#88DD88",  650: "#5CBF5C",  660: "#6BC76B",  670: "#7BD47B",
  680: "#8ADB8A",  690: "#99E699",
  700: "#FFB8D0",  710: "#FFC8DC",  720: "#FFA8C0",  730: "#FFD0E0",
  740: "#FF98B0",  750: "#FFCCDD",  760: "#FFB0C8",
  800: "#FF88AA",  810: "#FF7799",  820: "#FF6688",  830: "#FF99BB",
  900: "#FFAA55",  910: "#FFBB66",  920: "#FFCC88",  930: "#FF9944",
  1000: "#D0D0D0", 1050: "#D0D0D0",
};

function getColorByCode(code) {
  if (!code) return "#C0C0C0";
  const num = parseInt(code);
  if (isNaN(num)) return "#C0C0C0";
  if (MAVAT_CODE_COLORS[num]) return MAVAT_CODE_COLORS[num];
  const range = Math.floor(num / 100) * 100;
  if (MAVAT_CODE_COLORS[range]) return MAVAT_CODE_COLORS[range];
  return "#C0C0C0";
}

// מדרג גובה בינוי — 6 עצירות
const HEIGHT_STOPS = [
  { max: 0,  color: [42, 42, 74]   },   // אין מידע — אפור כהה #2a2a4a
  { max: 5,  color: [6, 182, 212]  },   // 1–5 קומות — טורקיז #06b6d4
  { max: 10, color: [16, 185, 129] },   // 6–10 — ירוק #10b981
  { max: 18, color: [234, 179, 8]  },   // 11–18 — צהוב #eab308
  { max: 28, color: [249, 115, 22] },   // 19–28 — כתום #f97316
  { max: 99, color: [239, 68, 68]  },   // 29+ — אדום #ef4444
];

function getHeightColor(floors) {
  if (!floors || floors <= 0) return '#2a2a4a';

  // אינטרפולציה בין עצירות
  let prev = HEIGHT_STOPS[1]; // min = 1
  for (let i = 2; i < HEIGHT_STOPS.length; i++) {
    const stop = HEIGHT_STOPS[i];
    if (floors <= stop.max) {
      const t = (floors - prev.max) / (stop.max - prev.max);
      const r = Math.round(prev.color[0] + t * (stop.color[0] - prev.color[0]));
      const g = Math.round(prev.color[1] + t * (stop.color[1] - prev.color[1]));
      const b = Math.round(prev.color[2] + t * (stop.color[2] - prev.color[2]));
      return `rgb(${r},${g},${b})`;
    }
    prev = stop;
  }
  return '#ef4444'; // אדום למעלה מ-28
}

// ===================================================================
//  מצב גלובלי
// ===================================================================
let currentTheme = 'default';
let geojsonLayer = null;
let geojsonData = null;
let allFeatures = [];
let compoundsLayer = null;
let compoundsData = null;
let contaminationLayer = null;
let contaminationData = null;

// צבעי מתחמים
const COMPOUND_COLORS = {
  1: '#e94560', 2: '#ff6b35', 3: '#ffd166',
  4: '#06d6a0', 5: '#118ab2', 6: '#8338ec',
  7: '#ff006e', 8: '#3a86a7', 9: '#fb5607',
};
let buildingRightsData = null;
let heightLookup = {};
let globalMaxFloors = 0;
let municipalityLookup = {};   // parcelId → 'tel_aviv' | 'ramat_hasharon'
let municipalBoundaryLayer = null;
let ownershipData = null;      // parcelId → { owners, category, ... }
let ownershipFilter = null;    // selected category name for filtering, null = show all
let affordableData = null;     // parcelId → { total, private_rental, state_rental, permanent_rental }
let publicInTradeableSet = new Set();  // parcel IDs with public use in tradeable designation
let map = null;

// ===================================================================
//  אתחול מפה
// ===================================================================
map = L.map('map', {
  center: [31.7, 34.9],
  zoom: 13,
  zoomControl: true,
});

// CartoDB Dark Matter — רקע כהה
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 20,
}).addTo(map);

// ===================================================================
//  בניית lookup גובה בינוי
// ===================================================================
function buildHeightLookup() {
  heightLookup = {};
  globalMaxFloors = 0;

  if (!buildingRightsData?.parcels) return;

  for (const [parcelId, parcelData] of Object.entries(buildingRightsData.parcels)) {
    const uses = parcelData.uses || [];
    let parcelMax = 0;

    for (const use of uses) {
      const floorsStr = use["קומות מעל הכניסה הקובעת"] || "";
      const digits = String(floorsStr).replace(/[^\d]/g, "");
      if (digits) {
        parcelMax = Math.max(parcelMax, parseInt(digits, 10));
      }
    }

    if (parcelMax > 0) {
      heightLookup[String(parcelId)] = parcelMax;
      globalMaxFloors = Math.max(globalMaxFloors, parcelMax);
    }
  }
}

function buildPublicInTradeableSet() {
  publicInTradeableSet = new Set();
  if (!buildingRightsData?.parcels) return;

  for (const [parcelId, parcelData] of Object.entries(buildingRightsData.parcels)) {
    const uses = parcelData.uses || [];
    const hasPublicUse = uses.some(u =>
      (u["שימוש"] || "").includes("ציבור מבנים ומוסדות")
    );
    if (hasPublicUse) {
      // check that the parcel's designation code is NOT public buildings (400-499)
      const matchingFeature = allFeatures.find(f =>
        String(f.properties["מספר תא שטח"]) === String(parcelId)
      );
      if (matchingFeature) {
        const code = parseInt(matchingFeature.properties["קוד ייעוד"]) || 0;
        if (code < 400 || code >= 500) {
          publicInTradeableSet.add(String(parcelId));
        }
      }
    }
  }
}

// ===================================================================
//  סגנון לפי נושא
// ===================================================================
function getStyleForTheme(feature, theme) {
  const parcelId = String(feature.properties["מספר תא שטח"] || "");
  const code = parseInt(feature.properties["קוד ייעוד"]) || 0;

  switch (theme) {
    case 'height': {
      const floors = heightLookup[parcelId] || 0;
      return {
        fillColor:   getHeightColor(floors),
        weight:      floors > 0 ? 1.5 : 0.5,
        opacity:     1,
        color:       floors > 0 ? '#555' : '#222',
        fillOpacity: floors > 0 ? 0.75 : 0.1,
      };
    }

    case 'publicSpaces': {
      const isMatch = (code >= 600 && code < 700);
      return {
        fillColor:   isMatch ? '#4ade80' : '#1a1a2e',
        weight:      isMatch ? 2.5 : 0.5,
        opacity:     1,
        color:       isMatch ? '#22c55e' : '#222',
        fillOpacity: isMatch ? 0.7 : 0.06,
      };
    }

    case 'publicBuildings': {
      const isMatch = (code >= 400 && code < 500);
      return {
        fillColor:   isMatch ? '#8B4513' : '#1a1a2e',
        weight:      isMatch ? 2.5 : 0.5,
        opacity:     1,
        color:       isMatch ? '#a0622e' : '#222',
        fillOpacity: isMatch ? 0.7 : 0.06,
      };
    }

    case 'roads': {
      const designation = (feature.properties["ייעוד"] || "").trim();
      const isProposed = designation.includes("דרך מוצעת");
      const isApproved = designation.includes("דרך מאושרת");
      const isRoad = isProposed || isApproved;
      return {
        fillColor:   isRoad ? (isApproved ? '#f472b6' : '#FFB8D0') : '#1a1a2e',
        weight:      isRoad ? 2.5 : 0.5,
        opacity:     1,
        color:       isRoad ? (isApproved ? '#db2777' : '#e88aab') : '#222',
        fillOpacity: isRoad ? 0.7 : 0.06,
      };
    }

    case 'municipality': {
      const muni = municipalityLookup[parcelId] || 'tel_aviv';
      const isTlv = (muni === 'tel_aviv');
      return {
        fillColor:   isTlv ? '#4a9eff' : '#f59e0b',
        weight:      1.5,
        opacity:     1,
        color:       isTlv ? '#2563eb' : '#d97706',
        fillOpacity: 0.55,
      };
    }

    case 'affordable': {
      if (!affordableData) return { fillColor: '#1a1a2e', weight: 0.5, opacity: 1, color: '#333', fillOpacity: 0.15 };
      const aff = affordableData.parcels[parcelId];
      if (!aff || aff.total === 0) return { fillColor: '#1a1a2e', weight: 0.5, opacity: 1, color: '#222', fillOpacity: 0.08 };
      // צבע לפי סוג השכרה דומיננטי
      let affColor = '#f59e0b'; // default amber
      if (aff.permanent_rental > 0) affColor = '#ef4444';       // אדום — לצמיתות
      else if (aff.private_rental > 0) affColor = '#3b82f6';    // כחול — פרטי
      else if (aff.state_rental > 0) affColor = '#f59e0b';      // כתום — מדינה
      // עוצמה לפי כמות יחידות
      const intensity = Math.min(aff.total / 250, 1);
      return {
        fillColor:   affColor,
        weight:      2,
        opacity:     1,
        color:       '#555',
        fillOpacity: 0.35 + intensity * 0.5,
      };
    }

    case 'ownership': {
      if (!ownershipData) return { fillColor: '#1a1a2e', weight: 0.5, opacity: 1, color: '#333', fillOpacity: 0.15 };
      const parcelOwner = ownershipData.parcels[parcelId];
      if (!parcelOwner) return { fillColor: '#1a1a2e', weight: 0.5, opacity: 1, color: '#333', fillOpacity: 0.1 };
      const cat = parcelOwner.category;
      const catData = ownershipData.categories[cat];
      const ownerColor = catData ? catData.color : '#888';
      const isMulti = parcelOwner.owners.length > 1;
      const filtered = ownershipFilter && cat !== ownershipFilter;
      return {
        fillColor:   filtered ? '#1a1a2e' : ownerColor,
        weight:      filtered ? 0.5 : (isMulti ? 2.5 : 1.5),
        opacity:     1,
        color:       filtered ? '#222' : (isMulti ? '#fff' : '#444'),
        fillOpacity: filtered ? 0.06 : 0.7,
        dashArray:   (!filtered && isMulti) ? '4,3' : null,
      };
    }

    case 'compounds': {
      // Make parcels semi-transparent so compound overlay is visible
      return {
        fillColor:   '#1a1a2e',
        weight:      0.5,
        opacity:     1,
        color:       '#333',
        fillOpacity: 0.15,
      };
    }

    case 'contamination': {
      // Make parcels semi-transparent so contamination overlay is visible
      return {
        fillColor:   '#1a1a2e',
        weight:      0.5,
        opacity:     1,
        color:       '#333',
        fillOpacity: 0.15,
      };
    }

    case 'publicInTradeable': {
      const isMatch = publicInTradeableSet.has(parcelId);
      return {
        fillColor:   isMatch ? '#ff6b35' : '#1a1a2e',
        weight:      isMatch ? 2.5 : 0.5,
        opacity:     1,
        color:       isMatch ? '#e55a2b' : '#222',
        fillOpacity: isMatch ? 0.7 : 0.06,
      };
    }

    default: {
      return {
        fillColor:   getColorByCode(code),
        weight:      1.5,
        opacity:     1,
        color:       '#333',
        fillOpacity: 0.6,
      };
    }
  }
}

// ===================================================================
//  Popup תוכן לפי נושא
// ===================================================================
function getPopupContent(feature) {
  const p = feature.properties;
  const id = p["מספר תא שטח"] || "—";
  const designation = p["ייעוד"] || "—";
  const code = p["קוד ייעוד"] || "";
  const color = getColorByCode(code);
  const areaDunam = p["שטח (דונם)"] ? parseFloat(p["שטח (דונם)"]).toFixed(1) : "";
  const areaSqm = p["שטח (מ\"ר)"] ? parseFloat(p["שטח (מ\"ר)"]).toLocaleString('he-IL') : "";
  const parcelId = String(id);

  let html = `
    <div class="popup-title">תא שטח ${id}</div>
    <span class="popup-badge" style="background:${color}">${designation}</span>`;

  // שורות בסיס
  const rows = [];
  if (areaDunam) rows.push(['שטח (דונם)', areaDunam]);
  if (areaSqm) rows.push(['שטח (מ"ר)', areaSqm]);

  // שורות דיור בהישג יד — רק בנושא דיור בהישג יד
  if (currentTheme === 'affordable' && affordableData) {
    const aff = affordableData.parcels[parcelId];
    if (aff && aff.total > 0) {
      rows.push(['יח"ד להשכרה', String(aff.total)]);
      if (aff.state_rental > 0) rows.push(['השכרה למדינה (15 שנה)', String(aff.state_rental)]);
      if (aff.private_rental > 0) rows.push(['השכרה לפרטיים (20 שנה)', String(aff.private_rental)]);
      if (aff.permanent_rental > 0) rows.push(['השכרה לצמיתות', String(aff.permanent_rental)]);
    } else {
      rows.push(['דיור בהישג יד', 'אין יח"ד']);
    }
  }

  // שורות נושא בעלויות
  if (currentTheme === 'ownership' && ownershipData) {
    const ow = ownershipData.parcels[parcelId];
    if (ow) {
      rows.push(['בעלות', ow.owners.join(', ')]);
      if (ow.owners.length > 1) rows.push(['סוג', 'בעלות מעורבת']);
    } else {
      rows.push(['בעלות', 'אין מידע']);
    }
  }

  // שורות נושא גובה
  if (currentTheme === 'height') {
    const floors = heightLookup[parcelId];
    if (floors) {
      rows.push(['קומות מעל הכניסה', String(floors)]);

      // סוג בינוי
      const rights = buildingRightsData?.parcels?.[parcelId];
      if (rights?.uses?.length) {
        const buildType = rights.uses[0]["בניין / מקום"] || rights.uses[0]["בניין \\ מקום"] || "";
        if (buildType) rows.push(['סוג בינוי', buildType]);

        // שימושים
        const useNames = rights.uses.map(u => u["שימוש"]).filter(Boolean);
        if (useNames.length) rows.push(['שימושים', useNames.join(', ')]);
      }
    } else {
      rows.push(['גובה בינוי', 'אין מידע']);
    }
  }

  for (const [label, value] of rows) {
    html += `<div class="popup-row"><span class="popup-label">${label}</span><span class="popup-value">${value}</span></div>`;
  }

  return html;
}

// ===================================================================
//  אינטראקציה עם שכבות
// ===================================================================
let selectedLayer = null;

function onEachFeature(feature, layer) {
  // תווית מספר תא שטח
  const parcelNum = feature.properties["מספר תא שטח"];
  if (parcelNum) {
    layer.bindTooltip(String(parcelNum), {
      permanent: true,
      direction: 'center',
      className: 'parcel-label',
    });
  }

  // Popup
  layer.bindPopup(() => getPopupContent(feature), { maxWidth: 280 });

  // Hover
  layer.on({
    mouseover: function() {
      if (layer !== selectedLayer) {
        layer.setStyle({ weight: 3, fillOpacity: Math.min((layer.options.fillOpacity || 0.6) + 0.2, 0.95) });
        layer.bringToFront();
      }
    },
    mouseout: function() {
      if (layer !== selectedLayer) {
        layer.setStyle(getStyleForTheme(feature, currentTheme));
      }
    },
    click: function() {
      if (selectedLayer && selectedLayer !== layer) {
        selectedLayer.setStyle(getStyleForTheme(selectedLayer.feature, currentTheme));
      }
      selectedLayer = layer;
      layer.setStyle({ weight: 3, fillOpacity: 0.9, color: '#fff' });
      layer.bringToFront();
    }
  });
}

// ===================================================================
//  תוויות לפי זום
// ===================================================================
function updateLabelVisibility() {
  if (!geojsonLayer) return;
  const zoom = map.getZoom();
  const showLabels = zoom >= 15;

  geojsonLayer.eachLayer(layer => {
    const tooltip = layer.getTooltip();
    if (!tooltip) return;
    const el = tooltip.getElement();
    if (el) el.style.display = showLabels ? '' : 'none';
  });
}

// ===================================================================
//  פתיחה/סגירה של פאנל מקרא
// ===================================================================
function toggleLegendPanel(show) {
  const panel = document.getElementById('legend-panel');
  const openBtn = document.getElementById('legend-toggle-open');
  if (show) {
    panel.classList.remove('collapsed');
    openBtn.classList.remove('visible');
  } else {
    panel.classList.add('collapsed');
    openBtn.classList.add('visible');
  }
  // Leaflet needs to know the map size changed
  setTimeout(() => map.invalidateSize(), 350);
}

// ===================================================================
//  החלפת נושא
// ===================================================================
function setTheme(themeName) {
  currentTheme = themeName;
  ownershipFilter = null;

  // עדכון כפתורים
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === themeName);
  });

  // רענון סגנונות שכבות
  if (geojsonLayer) {
    if (selectedLayer) {
      selectedLayer.closePopup();
      selectedLayer = null;
    }
    geojsonLayer.eachLayer(layer => {
      layer.setStyle(getStyleForTheme(layer.feature, themeName));
    });
  }

  // הצגה/הסתרת שכבת מתחמים
  if (compoundsLayer) {
    if (themeName === 'compounds') {
      compoundsLayer.addTo(map);
      compoundsLayer.bringToFront();
    } else {
      map.removeLayer(compoundsLayer);
    }
  }

  // הצגה/הסתרת שכבת אתרי זיהום
  if (contaminationLayer) {
    if (themeName === 'contamination') {
      contaminationLayer.addTo(map);
      contaminationLayer.bringToFront();
    } else {
      map.removeLayer(contaminationLayer);
    }
  }

  // הצגה/הסתרת קו גבול מוניציפלי
  if (municipalBoundaryLayer) {
    if (themeName === 'municipality' || themeName === 'compounds') {
      municipalBoundaryLayer.addTo(map);
      municipalBoundaryLayer.bringToFront();
    } else {
      map.removeLayer(municipalBoundaryLayer);
    }
  }

  // עדכון מקרא
  renderLegend(themeName);
}

// ===================================================================
//  מקרא דינמי
// ===================================================================
function renderLegend(theme) {
  const container = document.getElementById('legend-content');

  switch (theme) {
    case 'default':
      renderDefaultLegend(container);
      break;
    case 'height':
      renderHeightLegend(container);
      break;
    case 'publicSpaces':
      renderFilterLegend(container, 'publicSpaces');
      break;
    case 'publicBuildings':
      renderFilterLegend(container, 'publicBuildings');
      break;
    case 'roads':
      renderRoadsLegend(container);
      break;
    case 'compounds':
      renderCompoundsLegend(container);
      break;
    case 'municipality':
      renderMunicipalityLegend(container);
      break;
    case 'ownership':
      renderOwnershipLegend(container);
      break;
    case 'affordable':
      renderAffordableLegend(container);
      break;
    case 'contamination':
      renderContaminationLegend(container);
      break;
    case 'publicInTradeable':
      renderPublicInTradeableLegend(container);
      break;
  }
}

function renderDefaultLegend(container) {
  // ספירת חלקות לפי ייעוד
  const counts = {};
  const codes = {};
  for (const f of allFeatures) {
    const d = f.properties["ייעוד"] || "ללא ייעוד";
    counts[d] = (counts[d] || 0) + 1;
    if (!codes[d]) codes[d] = f.properties["קוד ייעוד"];
  }

  // מיון לפי מספר חלקות יורד
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  let html = '';
  for (const [designation, count] of sorted) {
    const color = getColorByCode(codes[designation]);
    html += `
      <div class="legend-item">
        <div class="legend-color" style="background:${color}"></div>
        <span>${designation}</span>
        <span class="legend-count">${count}</span>
      </div>`;
  }
  container.innerHTML = html;
}

function renderHeightLegend(container) {
  const withData = Object.keys(heightLookup).length;

  container.innerHTML = `
    <div class="gradient-legend">
      <div class="gradient-bar" style="background: linear-gradient(to top, #06b6d4, #10b981, #eab308, #f97316, #ef4444);"></div>
      <div class="gradient-ticks">
        <span>36+ קומות (~126 מ')</span>
        <span>28 (~98 מ')</span>
        <span>18 (~63 מ')</span>
        <span>10 (~35 מ')</span>
        <span>5 (~17.5 מ')</span>
        <span>1 קומה (~3.5 מ')</span>
      </div>
    </div>
    <div class="legend-note">
      📊 ${withData} חלקות עם נתוני גובה מתוך ${allFeatures.length}<br/>
      טווח: 1–${globalMaxFloors} קומות (עד ~${(globalMaxFloors * 3.5).toFixed(0)} מ')
    </div>
    <div style="margin-top:10px;">
      <div class="legend-item">
        <div class="legend-color" style="background:#2a2a4a"></div>
        <span>ללא מידע</span>
      </div>
    </div>`;
}

function renderFilterLegend(container, theme) {
  const isPublicSpaces = (theme === 'publicSpaces');
  const filterFn = isPublicSpaces
    ? (code) => code >= 600 && code < 700
    : (code) => code >= 400 && code < 500;

  const color = isPublicSpaces ? '#4ade80' : '#8B4513';
  const borderColor = isPublicSpaces ? '#22c55e' : '#6B3410';
  const label = isPublicSpaces ? 'שטחים ציבוריים פתוחים' : 'מבנים ומוסדות ציבור';
  const icon = isPublicSpaces ? '🌳' : '🏛️';

  // ספירה
  let count = 0;
  let totalArea = 0;
  for (const f of allFeatures) {
    const code = parseInt(f.properties["קוד ייעוד"]) || 0;
    if (filterFn(code)) {
      count++;
      const area = parseFloat(f.properties["שטח (דונם)"]) || 0;
      totalArea += area;
    }
  }

  container.innerHTML = `
    <div class="filter-legend-card" style="border-color:${borderColor}">
      <div class="filter-legend-stat" style="color:${color}">${icon} ${count}</div>
      <div class="filter-legend-label">${label}</div>
      <div class="filter-legend-detail">
        <div class="filter-legend-swatch" style="background:${color}"></div>
        שטח כולל: ${totalArea.toFixed(1)} דונם
      </div>
    </div>
    <div style="margin-top:12px;">
      <div class="legend-item">
        <div class="legend-color" style="background:#1a1a2e; border-color:#333"></div>
        <span>שאר תאי השטח</span>
      </div>
    </div>`;
}

function renderPublicInTradeableLegend(container) {
  let count = 0;
  let totalArea = 0;
  for (const f of allFeatures) {
    const pid = String(f.properties["מספר תא שטח"] || "");
    if (publicInTradeableSet.has(pid)) {
      count++;
      totalArea += parseFloat(f.properties["שטח (דונם)"]) || 0;
    }
  }

  container.innerHTML = `
    <div class="filter-legend-card" style="border-color:#e55a2b">
      <div class="filter-legend-stat" style="color:#ff6b35">🏛️ ${count}</div>
      <div class="filter-legend-label">מבני ציבור בשטחים סחירים</div>
      <div class="filter-legend-detail" style="font-size:11px; color:#8899aa; margin-bottom:8px;">
        שטחים בשימוש ציבורי בייעודים סחירים (לפי טבלה 5)
      </div>
      <div class="filter-legend-detail">
        <div class="filter-legend-swatch" style="background:#ff6b35"></div>
        שטח כולל: ${totalArea.toFixed(1)} דונם
      </div>
    </div>
    <div style="margin-top:12px;">
      <div class="legend-item">
        <div class="legend-color" style="background:#1a1a2e; border-color:#333"></div>
        <span>שאר תאי השטח</span>
      </div>
    </div>`;
}

function renderRoadsLegend(container) {
  let proposedCount = 0, approvedCount = 0;
  let proposedArea = 0, approvedArea = 0;

  for (const f of allFeatures) {
    const d = (f.properties["ייעוד"] || "").trim();
    const area = parseFloat(f.properties["שטח (דונם)"]) || 0;
    if (d.includes("דרך מוצעת")) { proposedCount++; proposedArea += area; }
    else if (d.includes("דרך מאושרת")) { approvedCount++; approvedArea += area; }
  }

  const total = proposedCount + approvedCount;
  const totalArea = proposedArea + approvedArea;

  container.innerHTML = `
    <div class="filter-legend-card" style="border-color:#e88aab">
      <div class="filter-legend-stat" style="color:#FFB8D0">🛣️ ${total}</div>
      <div class="filter-legend-label">דרכים בתכנית</div>
      <div class="filter-legend-detail">
        <div class="filter-legend-swatch" style="background:#FFB8D0"></div>
        דרך מוצעת: ${proposedCount} (${proposedArea.toFixed(1)} דונם)
      </div>
      <div class="filter-legend-detail">
        <div class="filter-legend-swatch" style="background:#f472b6"></div>
        דרך מאושרת: ${approvedCount} (${approvedArea.toFixed(1)} דונם)
      </div>
      <div class="filter-legend-detail" style="margin-top:6px; padding-top:6px; border-top:1px solid #1a2a3a;">
        <div class="filter-legend-swatch" style="background:transparent"></div>
        סה"כ: ${totalArea.toFixed(1)} דונם
      </div>
    </div>
    <div style="margin-top:12px;">
      <div class="legend-item">
        <div class="legend-color" style="background:#1a1a2e; border-color:#333"></div>
        <span>שאר תאי השטח</span>
      </div>
    </div>`;
}

function renderCompoundsLegend(container) {
  if (!compoundsData) { container.innerHTML = 'טוען...'; return; }
  const features = compoundsData.features || [];
  let html = '';
  for (const f of features.sort((a,b) => a.properties.compound - b.properties.compound)) {
    const p = f.properties;
    const c = COMPOUND_COLORS[p.compound] || '#888';
    html += `
      <div class="legend-item" style="padding:5px 0;">
        <div class="legend-color" style="background:${c}"></div>
        <span style="flex:1">${p.name}</span>
      </div>`;
  }
  container.innerHTML = html;
}

function renderMunicipalityLegend(container) {
  let tlvCount = 0, rsCount = 0;
  let tlvArea = 0, rsArea = 0;

  for (const f of allFeatures) {
    const pid = String(f.properties["מספר תא שטח"] || "");
    const muni = municipalityLookup[pid] || 'tel_aviv';
    const area = parseFloat(f.properties["שטח (דונם)"]) || 0;
    if (muni === 'tel_aviv') { tlvCount++; tlvArea += area; }
    else { rsCount++; rsArea += area; }
  }

  container.innerHTML = `

function renderOwnershipLegend(container) {
  if (!ownershipData) {
    container.innerHTML = '<div style="color:#888;padding:10px">טוען נתוני בעלויות...</div>';
    return;
  }

  const cats = ownershipData.categories;
  const summary = ownershipData.summary;

  // מיון: מדינה ראשון, אח"כ לפי כמות יורדת, מעורב אחרון
  const sorted = Object.entries(cats).sort((a, b) => {
    if (a[0] === 'מדינה') return -1;
    if (b[0] === 'מדינה') return 1;
    if (a[0] === 'מעורב') return 1;
    if (b[0] === 'מעורב') return -1;
    return b[1].count - a[1].count;
  });

  let html = `
    <div style="margin-bottom:12px; padding:8px; background:#0d1b2a; border-radius:6px; font-size:0.78rem;">
      <div style="color:#4a9eff; font-weight:700; margin-bottom:4px;">סיכום בעלויות</div>
      <div style="color:#a0b4cc;">ציבורי (מדינה): <span style="color:#3B82F6; font-weight:600;">${summary.public_parcels}</span></div>
      <div style="color:#a0b4cc;">פרטי: <span style="color:#EF4444; font-weight:600;">${summary.private_parcels}</span></div>
      <div style="color:#a0b4cc;">מעורב: <span style="color:#A855F7; font-weight:600;">${summary.mixed_parcels}</span></div>
    </div>`;

  for (const [name, data] of sorted) {
    const areaStr = data.total_area >= 1000
      ? (data.total_area / 1000).toFixed(1) + ' דונם'
      : data.total_area + ' מ"ר';
    const isPublic = name === 'מדינה';
    const isMixed = name === 'מעורב';
    const label = isPublic ? 'מדינה (כולל רשות פיתוח, קק"ל)' : name;
    const border = isMixed ? 'border: 1px dashed #A855F7;' : '';
    const isActive = ownershipFilter === name;
    const activeStyle = isActive ? 'background:rgba(74,158,255,0.15); border-radius:4px; padding:5px 4px;' : '';
    const dimStyle = (ownershipFilter && !isActive) ? 'opacity:0.4;' : '';
    const escapedName = name.replace(/'/g, "\\'");

    html += `
      <div class="legend-item" style="cursor:pointer; ${border} ${activeStyle} ${dimStyle}"
           onclick="toggleOwnershipFilter('${escapedName}')">
        <div class="legend-color" style="background:${data.color}"></div>
        <span>${label}</span>
        <span class="legend-count">${data.count}</span>
      </div>`;
  }

  html += `
    <div style="margin-top:10px;">
      <div class="legend-item">
        <div class="legend-color" style="background:transparent; border:2px dashed #fff; width:14px; height:14px;"></div>
        <span>בעלות מעורבת (כמה בעלים)</span>
      </div>
    </div>`;
  if (ownershipFilter) {
    html += `<div style="margin-top:8px; text-align:center;">
      <span style="color:#4a9eff; cursor:pointer; font-size:0.72rem;" onclick="toggleOwnershipFilter(null)">↩ הצג הכל</span>
    </div>`;
  }

  container.innerHTML = html;
}

function toggleOwnershipFilter(category) {
  ownershipFilter = (ownershipFilter === category) ? null : category;
  if (geojsonLayer) {
    geojsonLayer.eachLayer(layer => {
      layer.setStyle(getStyleForTheme(layer.feature, currentTheme));
    });
  }
  renderLegend('ownership');
}

function renderContaminationLegend(container) {
  if (!contaminationData) { container.innerHTML = 'טוען...'; return; }
  const features = contaminationData.features || [];

  // ספירת אתרים ייחודיים לפי שם
  const siteCounts = {};
  for (const f of features) {
    const name = f.properties.name || 'לא ידוע';
    siteCounts[name] = (siteCounts[name] || 0) + 1;
  }

  let html = `
    <div style="margin-bottom:12px; padding:10px; background:#0d1b2a; border-radius:6px; font-size:0.78rem;">
      <div style="color:#e94560; font-weight:700; margin-bottom:6px;">☣️ אתרים חשודים בזיהום קרקע</div>
      <div style="color:#e0e0e0; font-size:1.1rem; font-weight:700; margin-bottom:4px;">${Object.keys(siteCounts).length} אתרים</div>
      <div style="color:#a0b4cc;">${features.length} פוליגונים על המפה</div>
    </div>`;

  for (const [name, count] of Object.entries(siteCounts).sort((a, b) => b[1] - a[1])) {
    html += `
      <div class="legend-item">
        <div class="legend-color" style="background:#e94560"></div>
        <span>${name}</span>
        <span class="legend-count">${count > 1 ? count + ' אזורים' : ''}</span>
      </div>`;
  }

  html += `
    <div class="legend-note" style="margin-top:8px; font-size:0.7rem; color:#7a8fa0;">
      מקור: שכבת קרקעות מזוהמות — xref-zihum karka
    </div>`;

  container.innerHTML = html;
}

// ===================================================================
//  טעינת נתונים
// ===================================================================
async function loadAllData() {
  try {
    const [geoRes, rightsRes] = await Promise.all([
      fetch('data/parcels_merged.geojson'),
      fetch('data/building_rights.json'),
    ]);

    geojsonData = await geoRes.json();
    buildingRightsData = await rightsRes.json();

    allFeatures = geojsonData.features || [];

    // מיזוג נתוני גובה
    buildHeightLookup();

    // בניית סט חלקות עם שימוש ציבורי בייעוד סחיר
    buildPublicInTradeableSet();

    // הוספת שכבת GeoJSON
    geojsonLayer = L.geoJSON(geojsonData, {
      style: (feature) => getStyleForTheme(feature, currentTheme),
      onEachFeature,
    }).addTo(map);

    // התאמת תצוגה
    if (allFeatures.length > 0) {
      map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
    }

    // מקרא + תוויות
    renderLegend(currentTheme);
    updateLabelVisibility();
    map.on('zoomend', updateLabelVisibility);

    // סטטיסטיקות
    const withRights = Object.keys(buildingRightsData.parcels || {}).length;
    document.getElementById('stats-bar').textContent =
      `${allFeatures.length} תאי שטח | ${withRights} עם נתוני זכויות`;

    // קו כחול — גבול התכנית
    fetch('data/boundary.geojson')
      .then(r => r.json())
      .then(geo => {
        L.geoJSON(geo, {
          style: { color: '#4a9eff', weight: 3, opacity: 0.9, fillOpacity: 0, dashArray: '8,6' },
        }).addTo(map).bringToFront();
      })
      .catch(() => console.log('אין boundary.geojson'));

    // טעינת חלוקה מוניציפלית
    fetch('data/municipality_lookup.json')
      .then(r => r.json())
      .then(data => { municipalityLookup = data; })
      .catch(() => console.log('אין municipality_lookup.json'));

    // קו גבול מוניציפלי (מוסתר כברירת מחדל)
    fetch('data/municipal_boundary.geojson')
      .then(r => r.json())
      .then(geo => {
        municipalBoundaryLayer = L.geoJSON(geo, {
          style: { color: '#e94560', weight: 3.5, opacity: 1, fillOpacity: 0, dashArray: '10,6' },
        });
        // Don't add to map yet — only when municipality theme is active
      })
      .catch(() => console.log('אין municipal_boundary.geojson'));

    // טעינת נתוני בעלויות
    fetch('data/ownership.json')
      .then(r => r.json())
      .then(data => { ownershipData = data; })
      .catch(() => console.log('אין ownership.json'));

    // טעינת נתוני דיור בהישג יד
    fetch('data/affordable_housing.json')
      .then(r => r.json())
      .then(data => { affordableData = data; })
      .catch(() => console.log('אין affordable_housing.json'));

    // שכבת מתחמי תכנון (מוסתרת כברירת מחדל)
    fetch('data/compounds.geojson')
      .then(r => r.json())
      .then(geo => {
        compoundsData = geo;
        // נתונים מפורטים לכל מתחם
        const COMPOUND_DATA = {
          1: { units: '3,150', rows: [['יח"ד','3,150'],['תעסוקה','183,659 מ"ר'],['מסחר','10,795 מ"ר']] },
          2: { units: '—', rows: [['תעסוקה','574,260 מ"ר'],['לוגיסטיקה','4,300 מ"ר']] },
          3: { units: '2,312', rows: [['יח"ד','2,312'],['תעסוקה','84,615 מ"ר'],['מסחר','6,840 מ"ר']] },
          4: { units: '2,186', rows: [['יח"ד','2,186'],['מסחר','4,908 מ"ר']] },
          5: { units: '4,724', rows: [['יח"ד','4,724'],['תעסוקה','247,492 מ"ר'],['מסחר','16,375 מ"ר']] },
          6: { units: '2,748', rows: [['סה"כ יח"ד','2,748'],['רמת השרון','982 יח"ד'],['תל אביב','1,766 יח"ד'],['מסחר','4,695 מ"ר']] },
          7: { units: '2,143', rows: [['סה"כ יח"ד','2,143'],['רמת השרון','2,047 יח"ד'],['תל אביב','96 יח"ד'],['מסחר','8,220 מ"ר']] },
          8: { units: '2,057', rows: [['יח"ד','2,057'],['תעסוקה','55,407 מ"ר'],['מסחר','9,368 מ"ר']] },
          9: { units: '—', rows: [['תעסוקה','383,841 מ"ר'],['לוגיסטיקה','4,900 מ"ר']] },
        };

        compoundsLayer = L.geoJSON(geo, {
          style: (feature) => ({
            fillColor: COMPOUND_COLORS[feature.properties.compound] || '#888',
            weight: 3,
            opacity: 1,
            color: '#fff',
            fillOpacity: 0.35,
            dashArray: '6,4',
          }),
          onEachFeature: (feature, layer) => {
            const p = feature.properties;
            const cd = COMPOUND_DATA[p.compound] || { units: '?', rows: [] };
            const color = COMPOUND_COLORS[p.compound] || '#888';
            let popupHtml = `<div class="popup-title">${p.name}</div>`;
            popupHtml += `<span class="popup-badge" style="background:${color}">${p.use}</span>`;
            popupHtml += `<div class="popup-row"><span class="popup-label">גובה מקסימלי</span><span class="popup-value">${p.max_height} מ' · ${p.max_floors} קומות</span></div>`;
            for (const [label, value] of cd.rows) {
              popupHtml += `<div class="popup-row"><span class="popup-label">${label}</span><span class="popup-value">${value}</span></div>`;
            }
            layer.bindPopup(popupHtml, { maxWidth: 300 });
            layer.bindTooltip(p.name, { permanent: true, direction: 'center', className: 'compound-label' });
          },
        });
        // Don't add to map yet — only when theme is active
      })
      .catch(() => console.log('אין compounds.geojson'));

    // שכבת אתרים חשודים בזיהום (מוסתרת כברירת מחדל)
    fetch('data/contamination_sites.geojson')
      .then(r => r.json())
      .then(geo => {
        contaminationData = geo;
        contaminationLayer = L.geoJSON(geo, {
          style: () => ({
            fillColor: '#e94560',
            weight: 2.5,
            opacity: 1,
            color: '#ff6b81',
            fillOpacity: 0.45,
            dashArray: '5,3',
          }),
          onEachFeature: (feature, layer) => {
            const name = feature.properties.name || 'אתר לא מזוהה';
            layer.bindPopup(`<div class="popup-title">☣️ ${name}</div><span class="popup-badge" style="background:#e94560">אתר חשוד בזיהום</span>`);
            layer.bindTooltip(name, { permanent: false, direction: 'center', className: 'compound-label' });
          },
        });
        // Don't add to map yet — only when theme is active
      })
      .catch(() => console.log('אין contamination_sites.geojson'));

    // הסתרת טעינה
    document.getElementById('loading').classList.add('hidden');

  } catch (err) {
    console.error('שגיאה בטעינת נתונים:', err);
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center; color:#e94560;">
        <p style="font-size:1.2rem; margin-bottom:8px;">⚠️ שגיאה בטעינה</p>
        <p style="font-size:0.8rem; color:#a0b4cc;">${err.message}</p>
      </div>`;
  }
}

// ===================================================================
//  הפעלה
// ===================================================================
loadAllData();
</script>
