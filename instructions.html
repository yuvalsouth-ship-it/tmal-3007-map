<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תמ"ל 3007 — הוראות אל מול תשריט</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      direction: rtl;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    /* ===== HEADER ===== */
    #header {
      background: linear-gradient(135deg, #0f3460, #16213e);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #e94560;
      z-index: 1100;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }
    #header h1 span { color: #4a9eff; }
    #header .nav-links {
      display: flex;
      gap: 14px;
    }
    #header .nav-links a {
      color: #a0b4cc;
      text-decoration: none;
      font-size: 0.78rem;
      padding: 5px 12px;
      border: 1px solid #2a3a50;
      border-radius: 6px;
      transition: all 0.25s;
    }
    #header .nav-links a:hover {
      color: #fff;
      border-color: #4a9eff;
      background: rgba(74,158,255,0.1);
    }

    /* ===== MAIN LAYOUT ===== */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== PDF PANEL (RIGHT) ===== */
    #pdf-panel {
      width: 50%;
      min-width: 360px;
      display: flex;
      flex-direction: column;
      background: #16213e;
      border-left: 2px solid #2a3a50;
      z-index: 10;
    }

    /* Search bar */
    #search-bar {
      padding: 10px 14px;
      background: #0f3460;
      border-bottom: 1px solid #2a3a50;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    #search-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #2a3a50;
      background: #0d1b2a;
      color: #e0e0e0;
      font-size: 0.85rem;
      direction: rtl;
      outline: none;
      transition: border 0.2s;
    }
    #search-input:focus { border-color: #4a9eff; }
    #search-input::placeholder { color: #556; }

    .search-nav-btn {
      background: #1a2a40;
      border: 1px solid #2a3a50;
      color: #a0b4cc;
      width: 30px;
      height: 30px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .search-nav-btn:hover {
      background: #2a3a50;
      color: #fff;
    }
    .search-nav-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }
    #search-status {
      font-size: 0.72rem;
      color: #7a8fa0;
      white-space: nowrap;
      min-width: 80px;
      text-align: center;
    }

    /* Chapter navigation */
    #chapter-nav-container {
      background: #0d1b2a;
      border-bottom: 1px solid #2a3a50;
      flex-shrink: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    #chapter-nav-container.expanded {
      max-height: 300px;
      overflow-y: auto;
    }
    #chapter-toggle {
      padding: 6px 14px;
      background: #0f1b30;
      border-bottom: 1px solid #2a3a50;
      cursor: pointer;
      font-size: 0.75rem;
      color: #7a8fa0;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
      flex-shrink: 0;
      user-select: none;
    }
    #chapter-toggle:hover { color: #4a9eff; }
    #chapter-toggle .arrow {
      transition: transform 0.3s;
      display: inline-block;
    }
    #chapter-toggle.expanded .arrow {
      transform: rotate(90deg);
    }

    .nav-chapter {
      display: block;
      padding: 5px 18px;
      font-size: 0.75rem;
      color: #a0b4cc;
      text-decoration: none;
      border-bottom: 1px solid #1a2a3a;
      transition: all 0.15s;
      cursor: pointer;
    }
    .nav-chapter:hover {
      background: #1a2a40;
      color: #fff;
    }
    .nav-chapter.active {
      color: #4a9eff;
      background: rgba(74,158,255,0.08);
      border-right: 3px solid #4a9eff;
    }
    .nav-chapter.level-section {
      padding-right: 32px;
      font-size: 0.72rem;
    }

    /* PDF iframe */
    #pdf-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #pdf-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    /* Search results list */
    #search-results {
      max-height: 0;
      overflow: hidden;
      background: #0d1b2a;
      transition: max-height 0.3s ease;
      border-bottom: 1px solid #2a3a50;
    }
    #search-results.expanded {
      max-height: 200px;
      overflow-y: auto;
    }
    #search-results::-webkit-scrollbar { width: 6px; }
    #search-results::-webkit-scrollbar-track { background: #0d1b2a; }
    #search-results::-webkit-scrollbar-thumb {
      background: #2a3a50;
      border-radius: 3px;
    }
    .search-result-item {
      padding: 6px 14px;
      font-size: 0.73rem;
      color: #a0b4cc;
      border-bottom: 1px solid #1a2a3a;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .search-result-item:hover {
      background: #1a2a40;
      color: #fff;
    }
    .search-result-item.active {
      background: rgba(74,158,255,0.1);
      color: #4a9eff;
      border-right: 3px solid #4a9eff;
    }
    .result-page {
      background: #2a3a50;
      color: #4a9eff;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 0.68rem;
      flex-shrink: 0;
    }
    .result-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Notification toast */
    #notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #0f3460;
      border: 1px solid #4a9eff;
      color: #e0e0e0;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.82rem;
      z-index: 2000;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #notification.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Stats footer */
    #pdf-footer {
      padding: 5px 14px;
      font-size: 0.7rem;
      color: #556;
      background: #0d1b2a;
      border-top: 1px solid #2a3a50;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #pdf-footer .page-nav {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    #pdf-footer .page-nav button {
      background: #1a2a40;
      border: 1px solid #2a3a50;
      color: #a0b4cc;
      width: 24px;
      height: 22px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #pdf-footer .page-nav button:hover {
      background: #2a3a50;
      color: #fff;
    }
    #page-display {
      font-size: 0.72rem;
      color: #7a8fa0;
    }

    /* ===== MAP PANEL (LEFT) ===== */
    #map-container {
      flex: 1;
      position: relative;
      min-width: 300px;
    }
    #map-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
    #map-loading {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #4a9eff;
      font-size: 1.1rem;
      z-index: 5;
      transition: opacity 0.4s;
    }
    #map-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ===== SPLITTER ===== */
    #splitter {
      width: 5px;
      background: #2a3a50;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s;
      z-index: 20;
    }
    #splitter:hover, #splitter.active {
      background: #4a9eff;
    }

    /* ===== MAP TOGGLE BUTTON ===== */
    #map-toggle {
      background: linear-gradient(135deg, #0f3460, #1a3a60);
      border: 1px solid #4a9eff;
      color: #4a9eff;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
      white-space: nowrap;
      height: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #map-toggle:hover {
      background: linear-gradient(135deg, #1a3a60, #0f3460);
      color: #fff;
      border-color: #6ab8ff;
      box-shadow: 0 0 8px rgba(74,158,255,0.3);
    }

    /* Map collapsed state */
    #main.map-collapsed #map-container {
      display: none;
    }
    #main.map-collapsed #splitter {
      display: none;
    }
    #main.map-collapsed #pdf-panel {
      width: 100% !important;
      border-left: none;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      #main { flex-direction: column; }
      #pdf-panel {
        width: 100%;
        min-width: unset;
        height: 50%;
        border-left: none;
        border-bottom: 2px solid #2a3a50;
      }
      #splitter { display: none; }
      #map-container { min-width: unset; }
    }
  </style>
</head>
<body>

<!-- ========= HEADER ========= -->
<header id="header">
  <h1>📖 תמ"ל <span>3007</span> — הוראות אל מול תשריט</h1>
  <div class="nav-links">
    <a href="main.html">📊 אינפוגרפיקה</a>
    <a href="landing.html">🔍 חיפוש זכויות</a>
    <a href="index.html">🗺️ מפה מלאה</a>
  </div>
</header>

<!-- ========= MAIN ========= -->
<div id="main">

  <!-- PDF PANEL (RIGHT) -->
  <div id="pdf-panel">
    <!-- Search bar -->
    <div id="search-bar">
      <input type="text" id="search-input" placeholder="חיפוש בהוראות התכנית..." />
      <button class="search-nav-btn" id="search-prev" title="תוצאה קודמת" disabled>▲</button>
      <button class="search-nav-btn" id="search-next" title="תוצאה הבאה" disabled>▼</button>
      <span id="search-status"></span>
    </div>

    <!-- Search results list (expandable) -->
    <div id="search-results"></div>

    <!-- Chapter navigation toggle -->
    <div id="chapter-toggle" onclick="toggleChapterNav()">
      <span class="arrow">◀</span>
      <span>ניווט פרקים</span>
    </div>

    <!-- Chapter navigation -->
    <div id="chapter-nav-container">
      <div id="chapter-nav"></div>
    </div>

    <!-- PDF Content -->
    <div id="pdf-content">
      <iframe id="pdf-frame"></iframe>
    </div>

    <!-- Footer with page nav -->
    <div id="pdf-footer">
      <button onclick="toggleMap()" id="map-toggle" title="הסתר/הצג תשריט">🗺️ הסתר תשריט</button>
      <span id="footer-stats">טוען...</span>
      <div class="page-nav">
        <button onclick="navigatePdfPage(-1)" title="עמוד קודם">◀</button>
        <span id="page-display">—</span>
        <button onclick="navigatePdfPage(1)" title="עמוד הבא">▶</button>
      </div>
    </div>
  </div>

  <!-- SPLITTER -->
  <div id="splitter"></div>

  <!-- MAP PANEL (LEFT) -->
  <div id="map-container">
    <div id="map-loading">🗺️ טוען תשריט...</div>
    <iframe id="map-frame" src="index.html"></iframe>
  </div>

</div>

<!-- NOTIFICATION TOAST -->
<div id="notification"></div>

<script>
// ===================================================================
//  הגדרות
// ===================================================================
const PDF_URL = 'data/תמל_ 3007_תדפיס הוראות התכנית_חתום להפקדה ותמ-ל_1.pdf';
const TOTAL_PAGES = 63;

// ===================================================================
//  משתנים גלובליים
// ===================================================================
let instructionsData = null;
let parcelIndex = {};
let searchResults = [];      // [ { text, page, paraId, parcelRefs } ]
let currentResultIndex = -1;
let currentPdfPage = 1;
let mapReady = false;

// ===================================================================
//  טעינת PDF
// ===================================================================
let pdfInitialLoad = true;
function loadPdf(page) {
  currentPdfPage = page || 1;
  const pdfFrame = document.getElementById('pdf-frame');
  const targetSrc = `${PDF_URL}#page=${currentPdfPage}`;

  if (pdfInitialLoad) {
    // טעינה ראשונה — פשוט הגדר src
    pdfFrame.src = targetSrc;
    pdfInitialLoad = false;
  } else {
    // ניווט חוזר — אלץ טעינה מחדש ע״י מעבר דרך about:blank
    pdfFrame.src = 'about:blank';
    setTimeout(() => {
      pdfFrame.src = targetSrc;
    }, 60);
  }
  updatePageDisplay();
}

function navigatePdfPage(delta) {
  const newPage = currentPdfPage + delta;
  if (newPage >= 1 && newPage <= TOTAL_PAGES) {
    loadPdf(newPage);
  }
}

function goToPdfPage(page) {
  if (page >= 1 && page <= TOTAL_PAGES) {
    loadPdf(page);
  }
}

function updatePageDisplay() {
  document.getElementById('page-display').textContent = `עמוד ${currentPdfPage} / ${TOTAL_PAGES}`;
}

// ===================================================================
//  טעינת נתוני JSON (לחיפוש וקישור צולב)
// ===================================================================
async function loadInstructionsData() {
  try {
    const res = await fetch('data/plan_instructions.json');
    if (!res.ok) throw new Error('Failed to load instructions data');
    instructionsData = await res.json();
    parcelIndex = instructionsData.parcel_index || {};

    renderChapterNav();
    updateFooterStats();
  } catch (err) {
    console.error('Error loading instructions data:', err);
  }
}

// ===================================================================
//  ניווט פרקים
// ===================================================================
function renderChapterNav() {
  const nav = document.getElementById('chapter-nav');
  let html = '';

  for (const section of instructionsData.sections) {
    const isChapter = section.id.startsWith('ch') || section.id === 'intro';
    const isSubSection = section.id.match(/sec\d+_\d+_\d+/);

    if (isSubSection) continue;

    const levelClass = !isChapter ? 'level-section' : '';
    const page = section.page_start;
    html += `<a class="nav-chapter ${levelClass}" data-page="${page}"
              onclick="goToChapter('${section.id}', ${page})">${escapeHtml(section.title)}</a>`;
  }

  nav.innerHTML = html;
}

function toggleChapterNav() {
  const container = document.getElementById('chapter-nav-container');
  const toggle = document.getElementById('chapter-toggle');
  container.classList.toggle('expanded');
  toggle.classList.toggle('expanded');
}

function goToChapter(sectionId, page) {
  goToPdfPage(page);

  // עדכון active בניווט
  document.querySelectorAll('.nav-chapter').forEach(a => a.classList.remove('active'));
  const navItem = document.querySelector(`.nav-chapter[data-page="${page}"]`);
  if (navItem) navItem.classList.add('active');
}

// ===================================================================
//  חיפוש בהוראות — חיפוש ב-JSON, ניווט ב-PDF
// ===================================================================
function searchInstructions(query) {
  clearSearch();

  if (!query || query.length < 2 || !instructionsData) return;

  const lowerQuery = query.toLowerCase();
  const results = [];
  const seenPages = new Set();

  for (const section of instructionsData.sections) {
    for (const para of section.paragraphs) {
      if (para.text.toLowerCase().includes(lowerQuery)) {
        results.push({
          text: para.text,
          page: para.page,
          paraId: para.id,
          sectionTitle: section.title,
          parcelRefs: para.parcel_refs || [],
        });
      }
    }
  }

  if (results.length === 0) {
    updateSearchStatus(0, -1);
    return;
  }

  searchResults = results;
  currentResultIndex = 0;

  // הצגת רשימת תוצאות
  renderSearchResults();
  updateSearchStatus(results.length, 0);

  // ניווט לעמוד הראשון שנמצא
  goToPdfPage(results[0].page);

  // אם חיפוש מספר — גם הדגש במפה
  if (/^\d+$/.test(query) && parcelIndex[query]) {
    goToParcel(query);
  }
}

function renderSearchResults() {
  const container = document.getElementById('search-results');
  let html = '';

  // הצגת עד 50 תוצאות
  const maxShow = Math.min(searchResults.length, 50);
  for (let i = 0; i < maxShow; i++) {
    const r = searchResults[i];
    const textSnippet = r.text.length > 80 ? r.text.substring(0, 80) + '...' : r.text;
    const activeClass = i === currentResultIndex ? 'active' : '';
    html += `<div class="search-result-item ${activeClass}" data-index="${i}" onclick="goToSearchResult(${i})">
      <span class="result-page">עמ' ${r.page}</span>
      <span class="result-text">${escapeHtml(textSnippet)}</span>
    </div>`;
  }

  if (searchResults.length > 50) {
    html += `<div class="search-result-item" style="color:#556;cursor:default;">
      ועוד ${searchResults.length - 50} תוצאות...</div>`;
  }

  container.innerHTML = html;
  container.classList.add('expanded');
}

function goToSearchResult(index) {
  if (index < 0 || index >= searchResults.length) return;

  // עדכון active
  document.querySelectorAll('.search-result-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.search-result-item[data-index="${index}"]`);
  if (item) {
    item.classList.add('active');
    item.scrollIntoView({ block: 'nearest' });
  }

  currentResultIndex = index;
  updateSearchStatus(searchResults.length, index);

  // סגירת רשימת התוצאות אחרי בחירה
  const resultsContainer = document.getElementById('search-results');
  resultsContainer.classList.remove('expanded');

  // ניווט ל-PDF
  goToPdfPage(searchResults[index].page);
}

function navigateResult(direction) {
  if (searchResults.length === 0) return;

  let newIndex = currentResultIndex + direction;
  if (newIndex >= searchResults.length) newIndex = 0;
  if (newIndex < 0) newIndex = searchResults.length - 1;

  goToSearchResult(newIndex);
}

function clearSearch() {
  searchResults = [];
  currentResultIndex = -1;
  const container = document.getElementById('search-results');
  container.innerHTML = '';
  container.classList.remove('expanded');
  updateSearchStatus(0, -1);
}

function updateSearchStatus(total, current) {
  const el = document.getElementById('search-status');
  const prevBtn = document.getElementById('search-prev');
  const nextBtn = document.getElementById('search-next');
  const query = document.getElementById('search-input').value.trim();

  if (!total || total === 0) {
    el.textContent = query.length >= 2 ? 'לא נמצא' : '';
    el.style.color = query.length >= 2 ? '#e94560' : '#7a8fa0';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
  } else {
    el.textContent = `${current + 1} / ${total}`;
    el.style.color = '#4aff8a';
    prevBtn.disabled = false;
    nextBtn.disabled = false;
  }
}

function updateFooterStats() {
  if (!instructionsData) return;
  const m = instructionsData.metadata;
  document.getElementById('footer-stats').textContent =
    `${m.total_pages} עמודים | ${m.total_sections} סעיפים | ${m.unique_parcels_referenced} תאי שטח`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===================================================================
//  קישור צולב: חיפוש → מפה
// ===================================================================
function goToParcel(parcelId) {
  const iframe = document.getElementById('map-frame');
  if (iframe.contentWindow) {
    iframe.contentWindow.postMessage({
      action: 'selectParcel',
      parcelId: parcelId
    }, '*');
  }
  showNotification(`מציג תא שטח ${parcelId} בתשריט`);
}

// ===================================================================
//  קישור צולב: מפה → PDF (ניווט לעמוד הרלוונטי)
// ===================================================================
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.action) return;

  if (e.data.action === 'parcelClicked') {
    const parcelId = String(e.data.parcelId);
    navigateToParcelInPdf(parcelId);
  }

  if (e.data.action === 'mapReady') {
    mapReady = true;
  }
});

function navigateToParcelInPdf(parcelId) {
  const refs = parcelIndex[parcelId];
  if (refs && refs.length > 0) {
    // מציאת העמוד מתוך ה-paragraphs
    const paraId = refs[0];
    let targetPage = null;

    for (const section of instructionsData.sections) {
      for (const para of section.paragraphs) {
        if (para.id === paraId) {
          targetPage = para.page;
          break;
        }
      }
      if (targetPage) break;
    }

    if (targetPage) {
      goToPdfPage(targetPage);
      showNotification(`תא שטח ${parcelId} — עמוד ${targetPage} בהוראות (${refs.length} אזכורים)`);
    }
  } else {
    showNotification(`לא נמצאו אזכורים בהוראות לתא שטח ${parcelId}`);
  }
}

// ===================================================================
//  הודעת toast
// ===================================================================
let notificationTimeout = null;
function showNotification(text) {
  const el = document.getElementById('notification');
  el.textContent = text;
  el.classList.add('visible');

  if (notificationTimeout) clearTimeout(notificationTimeout);
  notificationTimeout = setTimeout(() => {
    el.classList.remove('visible');
  }, 3500);
}

// ===================================================================
//  Toggle מפה — הסתרת/הצגת פאנל התשריט
// ===================================================================
let mapVisible = true;
function toggleMap() {
  const main = document.getElementById('main');
  const btn = document.getElementById('map-toggle');
  mapVisible = !mapVisible;

  if (mapVisible) {
    main.classList.remove('map-collapsed');
    btn.innerHTML = '🗺️ הסתר תשריט';
    btn.title = 'הסתר תשריט';
  } else {
    main.classList.add('map-collapsed');
    btn.innerHTML = '🗺️ הצג תשריט';
    btn.title = 'הצג תשריט';
  }
}

// ===================================================================
//  Splitter — שינוי גודל פאנלים
// ===================================================================
(function initSplitter() {
  const splitter = document.getElementById('splitter');
  const panel = document.getElementById('pdf-panel');
  let isResizing = false;

  splitter.addEventListener('mousedown', (e) => {
    isResizing = true;
    splitter.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const containerWidth = document.getElementById('main').offsetWidth;
    const newWidth = e.clientX;
    const pct = (newWidth / containerWidth) * 100;
    if (pct > 20 && pct < 80) {
      panel.style.width = pct + '%';
    }
  });

  document.addEventListener('mouseup', () => {
    if (isResizing) {
      isResizing = false;
      splitter.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
})();

// ===================================================================
//  אירועי חיפוש
// ===================================================================
let searchDebounce = null;
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    searchInstructions(this.value.trim());
  }, 400);
});

document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (e.shiftKey) {
      navigateResult(-1);
    } else {
      if (searchResults.length === 0) {
        searchInstructions(this.value.trim());
      } else {
        navigateResult(1);
      }
    }
    e.preventDefault();
  }
});

document.getElementById('search-prev').addEventListener('click', () => navigateResult(-1));
document.getElementById('search-next').addEventListener('click', () => navigateResult(1));

// ===================================================================
//  iframe load
// ===================================================================
document.getElementById('map-frame').addEventListener('load', function() {
  document.getElementById('map-loading').classList.add('hidden');
  mapReady = true;
});

// ===================================================================
//  הפעלה
// ===================================================================
loadPdf(1);
loadInstructionsData();
</script>
